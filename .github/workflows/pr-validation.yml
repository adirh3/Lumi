name: PR Build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows is the primary/shipping platform: full build + test suite.
          - os: windows-latest
          # Linux and macOS build the full solution and run the platform-sensitive subset.
          # The remaining suite still contains Windows-only host and animation assumptions.
          - os: ubuntu-latest
          - os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore Lumi.slnx

      - name: Build
        run: dotnet build Lumi.slnx --configuration Release --no-restore

      - name: Test (full Windows suite)
        if: ${{ runner.os == 'Windows' }}
        run: dotnet test Lumi.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Test (cross-platform runtime behavior)
        if: ${{ runner.os != 'Windows' }}
        run: >
          dotnet test tests/Lumi.Tests/Lumi.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults
          --filter
          "(FullyQualifiedName~Lumi.Tests.UnixShellPathTests
          |FullyQualifiedName~Lumi.Tests.McpProxyRuntimeTests.Proxy_ResolvesPathCommandBeforeStartingStdioServer_OnUnix
          |FullyQualifiedName~Lumi.Tests.SystemPromptBuilderTests
          |FullyQualifiedName~Lumi.Tests.AgentsViewModelToolSelectionTests
          |FullyQualifiedName~Lumi.Tests.ChatViewModelAgentRoutingTests
          |FullyQualifiedName~Lumi.Tests.RebaseAttachmentPathsTests
          |FullyQualifiedName~Lumi.Tests.ToolDisplayHelperTests
          |FullyQualifiedName~Lumi.Tests.BrowserServiceLifecycleTests
          |FullyQualifiedName~Lumi.Tests.DataStorePlatformSkillMigrationTests
          |FullyQualifiedName~Lumi.Tests.LocKeyboardHintTests
          |FullyQualifiedName~Lumi.Tests.UpdateServiceSafetyTests.UpdateChannel_)"

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults
          if-no-files-found: ignore
